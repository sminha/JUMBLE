language: 'ko-KR'

reviews:
  profile: 'assertive'
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - 'client/**'
    - 'server/**'
    - '.github/**'
    - 'package.json'
    - '.coderabbit.yaml'
    - '!pnpm-lock.yaml'

tone_instructions: |
  한국어로 간결하고 건설적인 코드 리뷰를 제공합니다.
  리뷰 우선순위는 유지보수성 > 성능 > 보안입니다.
